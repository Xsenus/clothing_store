name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag or SHA)"
        required: false
        default: "main"

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_DIR: ${{ vars.VPS_APP_DIR != '' && vars.VPS_APP_DIR || '/opt/clothing_store' }}
      FRONTEND_DIST_DIR: ${{ vars.FRONTEND_DIST_DIR != '' && vars.FRONTEND_DIST_DIR || '/var/www/clothing-store' }}
      BACKEND_SERVICE: ${{ vars.BACKEND_SERVICE != '' && vars.BACKEND_SERVICE || 'clothing-store-api' }}
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}
      BACKEND_HEALTHCHECK_URL: ${{ vars.BACKEND_HEALTHCHECK_URL != '' && vars.BACKEND_HEALTHCHECK_URL || 'http://127.0.0.1:3001/products' }}
      BACKEND_DLL_PATH: ${{ vars.BACKEND_DLL_PATH != '' && vars.BACKEND_DLL_PATH || '/opt/clothing_store_runtime/store-api/Store.Api.dll' }}
      BACKEND_ENV_FILE: ${{ vars.BACKEND_ENV_FILE != '' && vars.BACKEND_ENV_FILE || '/etc/clothing-store/environment' }}
    steps:
      - name: Validate required secrets
        run: |
          test -n "${{ secrets.VPS_HOST }}"
          test -n "${{ secrets.VPS_USER }}"
          test -n "${{ secrets.VPS_SSH_KEY }}"

      - name: Deploy via SSH (direct mode only)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_SSH_PORT != '' && vars.VPS_SSH_PORT || '22' }}
          envs: APP_DIR,FRONTEND_DIST_DIR,BACKEND_SERVICE,DEPLOY_REF,BACKEND_HEALTHCHECK_URL,BACKEND_DLL_PATH,BACKEND_ENV_FILE
          script: |
            bash -seuo pipefail <<'EOF'
            BACKEND_TMP_PUBLISH_DIR=""

            on_error() {
              echo "[ERROR] Direct deploy failed"
              sudo systemctl status "$BACKEND_SERVICE" --no-pager || true
              sudo journalctl -u "$BACKEND_SERVICE" -n 100 --no-pager || true
            }

            cleanup() {
              if [[ -n "$BACKEND_TMP_PUBLISH_DIR" && -d "$BACKEND_TMP_PUBLISH_DIR" ]]; then
                rm -rf "$BACKEND_TMP_PUBLISH_DIR"
              fi
            }

            require_env_file() {
              if ! sudo test -f "$BACKEND_ENV_FILE"; then
                echo "[ERROR] Missing backend environment file: $BACKEND_ENV_FILE"
                exit 1
              fi

              if ! grep -Eq '^ConnectionStrings__DefaultConnection=' "$BACKEND_ENV_FILE"; then
                echo "[ERROR] $BACKEND_ENV_FILE does not define ConnectionStrings__DefaultConnection"
                exit 1
              fi
            }

            require_toolchain() {
              command -v bash >/dev/null
              command -v grep >/dev/null
              command -v node >/dev/null
              command -v npm >/dev/null
              command -v dotnet >/dev/null
              command -v rsync >/dev/null
              command -v curl >/dev/null

              echo "Node: $(node --version)"
              echo "npm: $(npm --version)"
              echo ".NET SDKs:"
              dotnet --list-sdks
              echo ".NET runtimes:"
              dotnet --list-runtimes

              if ! node -e "const major = Number(process.versions.node.split('.')[0]); process.exit(major >= 18 ? 0 : 1)"; then
                echo "[ERROR] Node.js 18+ is required on the VPS to build the frontend."
                exit 1
              fi

              if ! dotnet --list-sdks | grep -Eq '^9\.'; then
                echo "[ERROR] .NET 9 SDK is required on the VPS to publish backend/Store.Api."
                exit 1
              fi

              if ! dotnet --list-runtimes | grep -Eq '^Microsoft\.AspNetCore\.App 9\.'; then
                echo "[ERROR] ASP.NET Core 9 runtime is required on the VPS to run Store.Api.dll."
                exit 1
              fi
            }

            trap on_error ERR
            trap cleanup EXIT

            echo "==> Starting direct deploy"
            echo "APP_DIR=$APP_DIR"
            echo "DEPLOY_REF=$DEPLOY_REF"
            echo "FRONTEND_DIST_DIR=$FRONTEND_DIST_DIR"
            echo "BACKEND_SERVICE=$BACKEND_SERVICE"
            echo "BACKEND_DLL_PATH=$BACKEND_DLL_PATH"
            echo "BACKEND_ENV_FILE=$BACKEND_ENV_FILE"

            echo "==> Updating source code"
            cd "$APP_DIR"
            git fetch --prune --tags origin
            git reset --hard "$DEPLOY_REF"
            git submodule update --init --recursive

            BACKEND_PUBLISH_DIR="$(dirname "$BACKEND_DLL_PATH")"

            echo "==> Validating deployment environment"
            require_env_file
            require_toolchain

            echo "==> Validating backend runtime path from systemd"
            SYSTEMD_EXEC_START="$(sudo systemctl show -p ExecStart --value "$BACKEND_SERVICE")"
            if [[ "$SYSTEMD_EXEC_START" != *"$BACKEND_DLL_PATH"* ]]; then
              echo "[ERROR] BACKEND_DLL_PATH does not match systemd ExecStart"
              echo "Configured BACKEND_DLL_PATH: $BACKEND_DLL_PATH"
              echo "systemd ExecStart: $SYSTEMD_EXEC_START"
              exit 1
            fi
            SYSTEMD_WORKING_DIRECTORY="$(sudo systemctl show -p WorkingDirectory --value "$BACKEND_SERVICE")"
            if [[ "$SYSTEMD_WORKING_DIRECTORY" != "$APP_DIR" ]]; then
              echo "[ERROR] systemd WorkingDirectory must point to the repository root"
              echo "Expected WorkingDirectory: $APP_DIR"
              echo "systemd WorkingDirectory: $SYSTEMD_WORKING_DIRECTORY"
              exit 1
            fi
            SYSTEMD_ENV_FILES="$(sudo systemctl show -p EnvironmentFiles --value "$BACKEND_SERVICE")"
            if [[ "$SYSTEMD_ENV_FILES" != *"$BACKEND_ENV_FILE"* ]]; then
              echo "[ERROR] BACKEND_ENV_FILE does not match systemd EnvironmentFiles"
              echo "Configured BACKEND_ENV_FILE: $BACKEND_ENV_FILE"
              echo "systemd EnvironmentFiles: $SYSTEMD_ENV_FILES"
              exit 1
            fi
            sudo systemctl show "$BACKEND_SERVICE" -p WorkingDirectory -p ExecStart -p EnvironmentFiles --no-pager

            echo "==> Building frontend"
            npm ci
            npm run build

            echo "==> Syncing frontend dist to Nginx directory"
            sudo mkdir -p "$FRONTEND_DIST_DIR"
            sudo rsync -a --delete dist/ "$FRONTEND_DIST_DIR/"

            BACKEND_TMP_PUBLISH_DIR="$(mktemp -d /tmp/store-api-publish.XXXXXX)"

            echo "==> Publishing backend to temporary directory: $BACKEND_TMP_PUBLISH_DIR"
            dotnet publish backend/Store.Api/Store.Api.csproj -c Release -o "$BACKEND_TMP_PUBLISH_DIR"

            echo "==> Stopping backend service"
            sudo systemctl stop "$BACKEND_SERVICE"

            echo "==> Syncing backend artifacts to runtime directory: $BACKEND_PUBLISH_DIR"
            sudo mkdir -p "$BACKEND_PUBLISH_DIR"
            sudo rsync -a --delete "$BACKEND_TMP_PUBLISH_DIR"/ "$BACKEND_PUBLISH_DIR"/

            echo "==> Starting backend service"
            sudo systemctl start "$BACKEND_SERVICE"

            echo "==> Waiting for systemd service to become active"
            for attempt in $(seq 1 30); do
              if sudo systemctl is-active --quiet "$BACKEND_SERVICE"; then
                echo "[OK] Service is active"
                break
              fi

              if sudo systemctl is-failed --quiet "$BACKEND_SERVICE"; then
                echo "[ERROR] Backend service entered failed state while starting"
                sudo systemctl status "$BACKEND_SERVICE" --no-pager || true
                sudo journalctl -u "$BACKEND_SERVICE" -n 50 --no-pager || true
                exit 1
              fi

              if [[ "$attempt" -eq 30 ]]; then
                echo "[ERROR] Backend service did not become active in time"
                sudo systemctl status "$BACKEND_SERVICE" --no-pager || true
                exit 1
              fi

              echo "... waiting for service activation ($attempt/30)"
              sleep 1
            done

            echo "==> Running backend health check: $BACKEND_HEALTHCHECK_URL"
            for attempt in $(seq 1 15); do
              if curl --fail --silent --show-error --max-time 5 "$BACKEND_HEALTHCHECK_URL" >/dev/null; then
                echo "[OK] Backend health check passed"
                break
              fi

              echo "... health check attempt $attempt/15 failed"
              if ! sudo systemctl is-active --quiet "$BACKEND_SERVICE"; then
                echo "[ERROR] Backend service is no longer active during health checks"
                sudo systemctl status "$BACKEND_SERVICE" --no-pager || true
                sudo journalctl -u "$BACKEND_SERVICE" -n 50 --no-pager || true
                exit 1
              fi

              if [[ "$attempt" -eq 15 ]]; then
                echo "[ERROR] Backend health check did not pass in time"
                sudo systemctl status "$BACKEND_SERVICE" --no-pager || true
                exit 1
              fi

              sleep 2
            done

            echo "[OK] Direct deploy completed successfully"
            EOF
