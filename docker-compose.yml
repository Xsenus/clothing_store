services:
  postgres:
    image: postgres:16-alpine
    container_name: clothing_store_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clothing_store}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./deploy/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-clothing_store}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clothing_store_net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: clothing_store_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DATABASE_URL: Host=postgres;Port=5432;Database=${POSTGRES_DB:-clothing_store};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      STORE_UPLOADS_DIR: /data/uploads
      STORE_PRODUCTS_PATH: /app/backend/products.json
      STORE_SEED_PRODUCTS_PATH: /app/seed/products.jsonl
    volumes:
      - ./backend:/app/backend:ro
      - ./seed:/app/seed:ro
      - ./deploy/data/uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - clothing_store_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: clothing_store_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - clothing_store_net

networks:
  clothing_store_net:
    driver: bridge
